<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>NodeMAPS Dashboard</h2>

<button onclick="createProject()">+ New Project</button>

<br><br>

<input id="joinCode" placeholder="Enter Project Code">
<button onclick="joinProject()">Join</button>

<br><br>

<button onclick="logout()">Logout</button>

<div id="projects"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

auth.onAuthStateChanged(user=>{
  if(!user) window.location.href="login.html";
  loadProjects();
});

function createProject(){
  let id = "p_" + Date.now();

  db.collection("projects").doc(id).set({
    name:"New Project",
    owner:auth.currentUser.uid,
    members:[auth.currentUser.uid],
    users:{
      [auth.currentUser.uid]:{
        name:auth.currentUser.displayName,
        role:"owner",
        online:true
      }
    },
    createdAt:Date.now()
  });

  openProject(id);
}

function loadProjects(){
  db.collection("projects")
  .where("members","array-contains",auth.currentUser.uid)
  .onSnapshot(snap=>{

    let html="";

    snap.forEach(doc=>{
      html += `
        <div onclick="openProject('${doc.id}')">
          <h3>${doc.data().name}</h3>
          <small>${doc.id}</small>
        </div>
      `;
    });

    document.getElementById("projects").innerHTML = html;
  });
}

function joinProject(){
  let code = document.getElementById("joinCode").value;

  db.collection("projects").doc(code).get().then(doc=>{
    if(doc.exists){
      db.collection("projects").doc(code).update({
        members: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)
      });

      openProject(code);
    }else{
      alert("Invalid Code");
    }
  });
}

function openProject(id){
  window.location.href="editor.html?id="+id;
}

function logout(){
  auth.signOut().then(()=>{
    window.location.href="login.html";
  });
}

</script>

</body>
</html>
