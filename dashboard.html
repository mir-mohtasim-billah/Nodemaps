<!DOCTYPE html>
<html>
<head>
  <title>NodeMAPS Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>NodeMAPS</h2>

  <button>🏠 Home</button>
  <button>📁 My Projects</button>
  <button>👥 Shared</button>
  <button>🔑 Join Code</button>
  <button>⭐ Starred</button>
  <button>⚙ Settings</button>
</div>

<div class="main">

  <div class="topbar">
    <input id="search" placeholder="Search projects...">
    <button onclick="createProject()">+ New Project</button>
  </div>

  <div id="projects"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script src="firebase-config.js"></script>

<script>
auth.onAuthStateChanged(user => {
  if(!user) window.location.href = "login.html";
  loadProjects(user.uid);
});

function createProject(){
  const id = "p_" + Date.now();

  db.collection("projects").doc(id).set({
    name: "Untitled Project",
    owner: auth.currentUser.uid,
    members: [auth.currentUser.uid],
    createdAt: Date.now(),
    state: {nodes: [], edges: []}
  });

  loadProjects(auth.currentUser.uid);
}

function loadProjects(uid){
  db.collection("projects")
  .where("members","array-contains",uid)
  .onSnapshot(snap => {

    let html = "";

    snap.forEach(doc => {
      const p = doc.data();

      html += `
        <div class="card" onclick="openProject('${doc.id}')">
          <h3>${p.name}</h3>
          <p>Members: ${p.members.length}</p>
        </div>
      `;
    });

    document.getElementById("projects").innerHTML = html;
  });
}

function openProject(id){
  localStorage.setItem("projectId", id);
  window.location.href = "editor.html";
}
</script>

</body>
</html>
