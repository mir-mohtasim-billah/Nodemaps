<!DOCTYPE html>
<html>
<head>
  <title>NodeMAPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      display:flex;
      height:100vh;
      background:#f6f7fb;
    }

    /* SIDEBAR */
    .sidebar{
      width:260px;
      background:#111827;
      color:white;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .logo{
      font-size:20px;
      font-weight:700;
    }

    .nav-item{
      padding:10px;
      border-radius:10px;
      cursor:pointer;
      color:#cbd5e1;
    }

    .nav-item:hover{
      background:rgba(255,255,255,0.08);
      color:white;
    }

    input{
      padding:10px;
      border-radius:8px;
      border:none;
      outline:none;
    }

    .btn{
      padding:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    }

    .primary{
      background:#1a73e8;
      color:white;
    }

    /* MAIN */
    .main{
      flex:1;
      padding:20px;
      overflow:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .title{
      font-size:22px;
      font-weight:600;
    }

    /* SEARCH */
    .search{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ddd;
      margin-bottom:15px;
    }

    /* PROJECT ITEM */
    .project{
      background:white;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .left{
      flex:1;
      cursor:pointer;
    }

    .name{
      font-weight:600;
    }

    .meta{
      font-size:12px;
      color:#6b7280;
      margin-top:4px;
    }

    /* 3 DOT MENU */
    .menu{
      position:relative;
    }

    .dots{
      cursor:pointer;
      font-size:18px;
      padding:6px;
    }

    .dropdown{
      position:absolute;
      right:0;
      top:25px;
      background:white;
      border:1px solid #ddd;
      border-radius:10px;
      display:none;
      min-width:140px;
      box-shadow:0 10px 20px rgba(0,0,0,0.1);
      z-index:10;
    }

    .dropdown div{
      padding:10px;
      cursor:pointer;
      font-size:13px;
    }

    .dropdown div:hover{
      background:#f3f4f6;
    }

    .star{
      color:gold;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">NodeMAPS</div>

  <input id="joinCode" placeholder="Join code">
  <button class="btn primary" onclick="joinProject()">Join</button>

  <div class="nav-item" onclick="filterMode='all';load()">🏠 All</div>
  <div class="nav-item" onclick="filterMode='starred';load()">⭐ Starred</div>
  <div class="nav-item" onclick="filterMode='shared';load()">👥 Shared</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <div class="title">My Projects</div>
    <button class="btn primary" onclick="createProject()">+ New</button>
  </div>

  <input class="search" placeholder="Search projects..." oninput="search(this.value)">

  <div id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

let filterMode="all";
let allProjects=[];

auth.onAuthStateChanged(user=>{
  if(!user) window.location.href="login.html";
  load();
});

/* CREATE */
function createProject(){
  let id="p_"+Date.now();

  db.collection("projects").doc(id).set({
    name:"Untitled Project",
    owner:auth.currentUser.uid,
    members:[auth.currentUser.uid],
    starred:false,
    folder:"root",
    sharedWith:[],
    createdAt:Date.now(),
    updatedAt:Date.now()
  }).then(()=>{
    openProject(id);
  });
}

/* LOAD */
function load(){
  db.collection("projects")
  .where("members","array-contains",auth.currentUser.uid)
  .onSnapshot(snap=>{

    allProjects = [];

    snap.forEach(doc=>{
      let d=doc.data();
      d.id=doc.id;
      allProjects.push(d);
    });

    render(allProjects);

  });
}

/* RENDER */
function render(list){

  let html="";

  list.forEach(p=>{

    if(filterMode==="starred" && !p.starred) return;
    if(filterMode==="shared" && (!p.sharedWith || p.sharedWith.length===0)) return;

    let created = p.createdAt ? new Date(p.createdAt).toLocaleDateString() : "-";

    html+=`
      <div class="project">

        <div class="left" onclick="openProject('${p.id}')">
          <div class="name">
            ${p.starred ? "⭐ " : ""}${p.name}
          </div>
          <div class="meta">Created: ${created}</div>
        </div>

        <div class="menu">
          <div class="dots" onclick="toggleMenu(event,'${p.id}')">⋮</div>

          <div class="dropdown" id="menu-${p.id}">
            <div onclick="rename(event,'${p.id}')">Rename</div>
            <div onclick="toggleStar(event,'${p.id}')">Star</div>
            <div onclick="deleteProject(event,'${p.id}')">Delete</div>
          </div>

        </div>

      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* MENU */
function toggleMenu(e,id){
  e.stopPropagation();

  document.querySelectorAll(".dropdown").forEach(d=>d.style.display="none");

  let menu=document.getElementById("menu-"+id);
  menu.style.display = menu.style.display==="block"?"none":"block";
}

/* STAR */
function toggleStar(e,id){
  e.stopPropagation();

  let p = allProjects.find(x=>x.id===id);

  db.collection("projects").doc(id).update({
    starred: !p.starred,
    updatedAt:Date.now()
  });
}

/* RENAME */
function rename(e,id){
  e.stopPropagation();

  let name=prompt("Rename:");
  if(!name) return;

  db.collection("projects").doc(id).update({
    name,
    updatedAt:Date.now()
  });
}

/* DELETE */
function deleteProject(e,id){
  e.stopPropagation();

  if(!confirm("Delete?")) return;

  db.collection("projects").doc(id).delete();
}

/* SEARCH */
function search(val){
  let filtered = allProjects.filter(p =>
    p.name.toLowerCase().includes(val.toLowerCase())
  );

  render(filtered);
}

/* JOIN */
function joinProject(){
  let code=document.getElementById("joinCode").value;

  db.collection("projects").doc(code).update({
    sharedWith: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)
  });

  openProject(code);
}

/* OPEN */
function openProject(id){
  window.location.href="editor.html?id="+id;
}

</script>

</body>
</html>
