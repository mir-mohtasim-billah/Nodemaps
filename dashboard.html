<!DOCTYPE html>
<html>
<head>
  <title>NodeMAPS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      background:#f5f7fb;
      color:#111827;
      overflow:hidden;
    }

    /* SIDEBAR */
    .sidebar{
      width:280px;
      background:linear-gradient(180deg,#0f172a 0%, #0b1328 100%);
      color:white;
      padding:20px 18px;
      display:flex;
      flex-direction:column;
      gap:18px;
      border-right:1px solid rgba(255,255,255,0.05);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      padding:4px 2px 10px 2px;
    }

    .brand img{
      width:40px;
      height:40px;
      object-fit:contain;
      border-radius:10px;
      flex-shrink:0;
    }

    .brand-name{
      font-size:22px;
      font-weight:700;
      letter-spacing:.2px;
      color:#ffffff;
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .nav-item{
      padding:12px 14px;
      border-radius:12px;
      color:#dbe3f1;
      cursor:pointer;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:10px;
      transition:.18s;
    }

    .nav-item:hover,
    .nav-item.active{
      background:rgba(255,255,255,0.09);
      color:#ffffff;
    }

    .join-box{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:4px;
    }

    .join-box input{
      border:none;
      outline:none;
      padding:12px 14px;
      border-radius:12px;
      background:#f8fafc;
      color:#111827;
      font-size:14px;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:12px;
      padding:11px 14px;
      font-weight:600;
      font-size:15px;
      transition:.18s;
    }

    .btn-primary{
      background:#2563eb;
      color:white;
    }

    .btn-primary:hover{
      background:#1d4ed8;
    }

    .folder-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:#9fb0c8;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.7px;
      margin-top:2px;
    }

    .folder-add{
      background:transparent;
      color:#dbe3f1;
      border:none;
      cursor:pointer;
      font-size:22px;
      line-height:1;
    }

    .folders{
      display:flex;
      flex-direction:column;
      gap:6px;
      max-height:220px;
      overflow:auto;
      padding-right:4px;
    }

    .folder-item{
      padding:10px 12px;
      border-radius:10px;
      color:#dbe3f1;
      cursor:pointer;
      font-size:14px;
      display:flex;
      gap:8px;
      align-items:center;
      transition:.18s;
    }

    .folder-item:hover,
    .folder-item.active{
      background:rgba(255,255,255,0.09);
      color:#ffffff;
    }

    .sidebar-footer{
      margin-top:auto;
      border-top:1px solid rgba(255,255,255,.08);
      padding-top:14px;
    }

    .user-small{
      font-size:13px;
      color:#b6c2d3;
      margin-bottom:10px;
      word-break:break-all;
    }

    .logout-btn{
      width:100%;
      background:rgba(255,255,255,0.07);
      color:white;
      border:1px solid rgba(255,255,255,0.08);
    }

    .logout-btn:hover{
      background:rgba(255,255,255,0.12);
    }

    /* MAIN */
    .main{
      flex:1;
      overflow:auto;
      padding:30px 30px 60px;
    }

    .top-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      margin-bottom:24px;
    }

    .welcome h1{
      font-size:30px;
      margin-bottom:8px;
      font-weight:700;
      color:#111827;
    }

    .welcome p{
      color:#6b7280;
      font-size:16px;
    }

    /* TEMPLATE SECTION */
    .cards{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:34px;
    }

    .card{
      width:205px;
      height:165px;
      background:white;
      border:1px solid #e5e7eb;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      box-shadow:0 10px 28px rgba(0,0,0,.04);
      transition:.2s;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 36px rgba(0,0,0,.08);
      border-color:#c7d2fe;
    }

    .card-icon{
      font-size:36px;
      margin-bottom:14px;
      line-height:1;
    }

    .plus{
      color:#2563eb;
      font-size:44px;
      font-weight:300;
    }

    .card span{
      font-size:16px;
      color:#374151;
      font-weight:500;
    }

    /* SEARCH + SECTION */
    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .section-title{
      font-size:18px;
      font-weight:700;
      color:#111827;
    }

    .search{
      width:360px;
      max-width:100%;
      border:1px solid #e5e7eb;
      background:white;
      padding:12px 14px;
      border-radius:14px;
      outline:none;
      font-size:14px;
      box-shadow:0 8px 18px rgba(0,0,0,.03);
    }

    .search:focus{
      border-color:#93c5fd;
    }

    /* PROJECT LIST */
    .project-list{
      background:white;
      border:1px solid #e5e7eb;
      border-radius:18px;
      overflow:visible;
      box-shadow:0 18px 38px rgba(0,0,0,.06);
    }

    .table-head{
      display:grid;
      grid-template-columns: 2.3fr 0.8fr 1fr 1fr 50px;
      gap:12px;
      padding:16px 20px;
      color:#6b7280;
      font-size:13px;
      border-bottom:1px solid #eef2f7;
      background:#fbfcff;
      border-radius:18px 18px 0 0;
      font-weight:600;
    }

    .project-row{
      display:grid;
      grid-template-columns: 2.3fr 0.8fr 1fr 1fr 50px;
      gap:12px;
      align-items:center;
      padding:16px 20px;
      border-bottom:1px solid #eef2f7;
      transition:.16s;
      position:relative;
    }

    .project-row:last-child{
      border-bottom:none;
    }

    .project-row:hover{
      background:#f8fbff;
    }

    .project-name{
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      min-width:0;
    }

    .doc-icon{
      width:32px;
      height:32px;
      border-radius:10px;
      background:#eaf2ff;
      color:#2563eb;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:15px;
      flex:0 0 auto;
    }

    .name-block{
      min-width:0;
    }

    .name-text{
      font-weight:700;
      color:#111827;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:420px;
      font-size:15px;
    }

    .code-text{
      color:#94a3b8;
      font-size:12px;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:420px;
    }

    .cell{
      color:#6b7280;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .star-mark{
      color:#f59e0b;
      margin-right:4px;
    }

    .menu-wrap{
      position:relative;
      display:flex;
      justify-content:flex-end;
    }

    .dots{
      width:34px;
      height:34px;
      border-radius:50%;
      border:none;
      background:transparent;
      cursor:pointer;
      font-size:20px;
      color:#6b7280;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .dots:hover{
      background:#eef2ff;
      color:#111827;
    }

    .dropdown{
      display:none;
      position:absolute;
      right:0;
      top:38px;
      width:200px;
      background:white;
      border:1px solid #e5e7eb;
      border-radius:12px;
      box-shadow:0 20px 45px rgba(0,0,0,.14);
      z-index:1000;
      overflow:hidden;
    }

    .dropdown.show{
      display:block;
    }

    .menu-option{
      padding:11px 13px;
      cursor:pointer;
      font-size:14px;
      color:#374151;
      display:flex;
      gap:9px;
      align-items:center;
    }

    .menu-option:hover{
      background:#f3f6ff;
    }

    .menu-danger{
      color:#dc2626;
    }

    .empty{
      padding:34px;
      color:#6b7280;
      text-align:center;
      font-size:14px;
    }

    @media(max-width:1024px){
      .table-head{
        grid-template-columns: 2fr 1fr 1fr 1fr 50px;
      }

      .project-row{
        grid-template-columns: 2fr 1fr 1fr 1fr 50px;
      }
    }

    @media(max-width:900px){
      .sidebar{
        width:235px;
      }

      .table-head{
        display:none;
      }

      .project-row{
        grid-template-columns:1fr 45px;
      }

      .cell{
        display:none;
      }

      .search{
        width:100%;
      }
    }

    @media(max-width:650px){
      body{
        flex-direction:column;
        overflow:auto;
      }

      .sidebar{
        width:100%;
        min-height:auto;
      }

      .main{
        padding:22px;
      }

      .card{
        width:100%;
        height:130px;
      }

      .brand img{
        width:34px;
        height:34px;
      }

      .brand-name{
        font-size:20px;
      }
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png" alt="NodeMAPS Logo">
      <div class="brand-name">NodeMAPS</div>
    </div>

    <div class="nav" id="mainNav"></div>

    <div class="join-box">
      <input id="joinCode" placeholder="Enter project code">
      <button class="btn btn-primary" onclick="joinProject()">Join Project</button>
    </div>

    <div class="folder-title">
      <span>Folders</span>
      <button class="folder-add" onclick="createFolder()" title="Create folder">+</button>
    </div>

    <div class="folders" id="foldersList"></div>

    <div class="sidebar-footer">
      <div class="user-small" id="userEmail">Signed in</div>
      <button class="btn logout-btn" onclick="logout()">Logout</button>
    </div>
  </aside>

  <main class="main">
    <div class="top-row">
      <div class="welcome">
        <h1>Welcome back 👋</h1>
        <p>Create, organize and explore your mind maps</p>
      </div>
    </div>

    <div class="cards">
      <div class="card" onclick="createProject('blank')">
        <div class="card-icon plus">+</div>
        <span>Blank Map</span>
      </div>

      <div class="card" onclick="createProject('mindmap')">
        <div class="card-icon">🧠</div>
        <span>Mind Map</span>
      </div>

      <div class="card" onclick="createProject('orgchart')">
        <div class="card-icon">🏗️</div>
        <span>Org Chart</span>
      </div>
    </div>

    <div class="toolbar">
      <div class="section-title" id="viewTitle">My Maps</div>
      <input class="search" id="searchInput" placeholder="Search projects..." oninput="setSearch(this.value)">
    </div>

    <div class="project-list">
      <div class="table-head">
        <div>Name</div>
        <div>Owner</div>
        <div>Folder</div>
        <div>Updated</div>
        <div></div>
      </div>

      <div id="projects"></div>
    </div>
  </main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>
let currentUser = null;
let allProjects = [];
let allFolders = [];
let currentView = "all";
let currentFolder = null;
let searchText = "";
let projectsUnsub = null;
let foldersUnsub = null;

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  document.getElementById("userEmail").textContent = user.email || user.displayName || "Signed in";

  renderMainNav();
  loadProjects();
  loadFolders();
});

function renderMainNav(){
  const items = [
    { id:"all", label:"Home", icon:"🏠" },
    { id:"starred", label:"Favorites", icon:"⭐" },
    { id:"shared", label:"Shared with me", icon:"👥" },
    { id:"trash", label:"Trash", icon:"🗑️" }
  ];

  let html = "";

  items.forEach(item => {
    html += `
      <div class="nav-item ${currentView === item.id ? "active" : ""}" onclick="setView('${item.id}')">
        <span>${item.icon}</span>
        <span>${item.label}</span>
      </div>
    `;
  });

  document.getElementById("mainNav").innerHTML = html;
}

function renderFolders(){
  let html = `
    <div class="folder-item ${currentView === "folder" && currentFolder === "root" ? "active" : ""}" onclick="setFolder('root')">
      📁 Root
    </div>
  `;

  allFolders.forEach(folder => {
    html += `
      <div class="folder-item ${currentView === "folder" && currentFolder === folder.id ? "active" : ""}" onclick="setFolder('${folder.id}')">
        📁 ${escapeHTML(folder.name)}
      </div>
    `;
  });

  document.getElementById("foldersList").innerHTML = html;
}

function setView(view){
  currentView = view;
  currentFolder = null;
  renderMainNav();
  renderFolders();
  renderProjects();
}

function setFolder(folderId){
  currentView = "folder";
  currentFolder = folderId;
  renderMainNav();
  renderFolders();
  renderProjects();
}

function setSearch(value){
  searchText = value.toLowerCase().trim();
  renderProjects();
}

function loadProjects(){
  if (projectsUnsub) projectsUnsub();

  projectsUnsub = db.collection("projects")
    .where("members", "array-contains", currentUser.uid)
    .onSnapshot(snapshot => {
      allProjects = [];

      snapshot.forEach(doc => {
        const data = doc.data();
        data.id = doc.id;
        allProjects.push(data);
      });

      allProjects.sort((a,b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));

      renderProjects();
    }, error => {
      document.getElementById("projects").innerHTML = `
        <div class="empty">Failed to load projects: ${escapeHTML(error.message)}</div>
      `;
    });
}

function loadFolders(){
  if (foldersUnsub) foldersUnsub();

  foldersUnsub = db.collection("folders")
    .where("members", "array-contains", currentUser.uid)
    .onSnapshot(snapshot => {
      allFolders = [];

      snapshot.forEach(doc => {
        const data = doc.data();
        data.id = doc.id;
        allFolders.push(data);
      });

      allFolders.sort((a,b) => (a.name || "").localeCompare(b.name || ""));

      renderFolders();
    }, error => {
      console.log("Folder load failed:", error.message);
    });
}

function renderProjects(){
  let filtered = allProjects.filter(project => {
    const deleted = project.deleted === true;
    const ownerIsMe = project.owner === currentUser.uid;
    const folder = project.folder || "root";
    const name = (project.name || "Untitled Project").toLowerCase();

    if (searchText && !name.includes(searchText)) return false;

    if (currentView === "all") return !deleted;
    if (currentView === "starred") return !deleted && project.starred === true;
    if (currentView === "shared") return !deleted && !ownerIsMe;
    if (currentView === "trash") return deleted;
    if (currentView === "folder") return !deleted && folder === currentFolder;

    return !deleted;
  });

  updateViewTitle();

  if (filtered.length === 0) {
    document.getElementById("projects").innerHTML = `
      <div class="empty">No projects found</div>
    `;
    return;
  }

  let html = "";

  filtered.forEach(project => {
    const ownerText = project.owner === currentUser.uid ? "me" : "shared";
    const folderName = getFolderName(project.folder || "root");
    const updated = formatDateOnly(project.updatedAt || project.createdAt);
    const created = formatDateOnly(project.createdAt);
    const projectName = project.name || "Untitled Project";

    html += `
      <div class="project-row">
        <div class="project-name" onclick="openProject('${project.id}')">
          <div class="doc-icon">▤</div>

          <div class="name-block">
            <div class="name-text">
              ${project.starred ? '<span class="star-mark">★</span>' : ""}
              ${escapeHTML(projectName)}
            </div>
            <div class="code-text">
              ${escapeHTML(project.id)} • Created ${created}
            </div>
          </div>
        </div>

        <div class="cell">${ownerText}</div>
        <div class="cell">${escapeHTML(folderName)}</div>
        <div class="cell">${updated}</div>

        <div class="menu-wrap">
          <button class="dots" onclick="toggleMenu(event, '${project.id}')">⋮</button>

          <div class="dropdown" id="menu-${project.id}">
            ${
              currentView === "trash"
              ? `
                <div class="menu-option" onclick="restoreProject(event, '${project.id}')">↩️ Restore</div>
                <div class="menu-option menu-danger" onclick="deleteForever(event, '${project.id}')">🗑️ Delete forever</div>
              `
              : `
                <div class="menu-option" onclick="renameProject(event, '${project.id}')">✏️ Rename</div>
                <div class="menu-option" onclick="toggleStar(event, '${project.id}')">
                  ${project.starred ? "☆ Unstar" : "⭐ Star"}
                </div>
                <div class="menu-option" onclick="moveToFolder(event, '${project.id}')">📁 Move to folder</div>
                <div class="menu-option" onclick="copyProjectCode(event, '${project.id}')">🔗 Copy share code</div>
                <div class="menu-option menu-danger" onclick="moveToTrash(event, '${project.id}')">🗑️ Move to trash</div>
              `
            }
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById("projects").innerHTML = html;
}

function updateViewTitle(){
  let title = "My Maps";

  if (currentView === "starred") title = "Favorites";
  if (currentView === "shared") title = "Shared with me";
  if (currentView === "trash") title = "Trash";
  if (currentView === "folder") title = "Folder: " + getFolderName(currentFolder);

  document.getElementById("viewTitle").textContent = title;
}

function createProject(type){
  const id = "p_" + Date.now();

  let name = "Untitled Project";
  if (type === "mindmap") name = "Untitled Mind Map";
  if (type === "orgchart") name = "Untitled Org Chart";

  db.collection("projects").doc(id).set({
    name: name,
    type: type || "blank",
    owner: currentUser.uid,
    ownerEmail: currentUser.email || "",
    members: [currentUser.uid],
    sharedWith: [],
    starred: false,
    folder: "root",
    deleted: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  }).then(() => {
    openProject(id);
  }).catch(error => {
    alert("Project create failed: " + error.message);
  });
}

function createFolder(){
  const name = prompt("Folder name:");

  if (!name || !name.trim()) return;

  const id = "f_" + Date.now();

  db.collection("folders").doc(id).set({
    name: name.trim(),
    owner: currentUser.uid,
    members: [currentUser.uid],
    createdAt: Date.now(),
    updatedAt: Date.now()
  }).catch(error => {
    alert("Folder create failed: " + error.message);
  });
}

function moveToFolder(event, projectId){
  event.stopPropagation();

  const folderName = prompt("Enter folder name. Type root to remove from folder:");

  if (!folderName || !folderName.trim()) return;

  const cleanName = folderName.trim();

  if (cleanName.toLowerCase() === "root") {
    db.collection("projects").doc(projectId).update({
      folder: "root",
      updatedAt: Date.now()
    });
    return;
  }

  let existing = allFolders.find(f => (f.name || "").toLowerCase() === cleanName.toLowerCase());

  if (existing) {
    db.collection("projects").doc(projectId).update({
      folder: existing.id,
      updatedAt: Date.now()
    });
    return;
  }

  const newFolderId = "f_" + Date.now();

  db.collection("folders").doc(newFolderId).set({
    name: cleanName,
    owner: currentUser.uid,
    members: [currentUser.uid],
    createdAt: Date.now(),
    updatedAt: Date.now()
  }).then(() => {
    return db.collection("projects").doc(projectId).update({
      folder: newFolderId,
      updatedAt: Date.now()
    });
  }).catch(error => {
    alert("Move failed: " + error.message);
  });
}

function renameProject(event, projectId){
  event.stopPropagation();

  const project = allProjects.find(p => p.id === projectId);
  const oldName = project ? project.name : "";

  const newName = prompt("Rename project:", oldName || "Untitled Project");

  if (!newName || !newName.trim()) return;

  db.collection("projects").doc(projectId).update({
    name: newName.trim(),
    updatedAt: Date.now()
  }).catch(error => {
    alert("Rename failed: " + error.message);
  });
}

function toggleStar(event, projectId){
  event.stopPropagation();

  const project = allProjects.find(p => p.id === projectId);
  if (!project) return;

  db.collection("projects").doc(projectId).update({
    starred: !project.starred,
    updatedAt: Date.now()
  }).catch(error => {
    alert("Star update failed: " + error.message);
  });
}

function moveToTrash(event, projectId){
  event.stopPropagation();

  if (!confirm("Move this project to trash?")) return;

  db.collection("projects").doc(projectId).update({
    deleted: true,
    updatedAt: Date.now()
  }).catch(error => {
    alert("Delete failed: " + error.message);
  });
}

function restoreProject(event, projectId){
  event.stopPropagation();

  db.collection("projects").doc(projectId).update({
    deleted: false,
    updatedAt: Date.now()
  }).catch(error => {
    alert("Restore failed: " + error.message);
  });
}

function deleteForever(event, projectId){
  event.stopPropagation();

  if (!confirm("Delete forever? This cannot be undone.")) return;

  db.collection("projects").doc(projectId).delete().catch(error => {
    alert("Permanent delete failed: " + error.message);
  });
}

function copyProjectCode(event, projectId){
  event.stopPropagation();

  if (navigator.clipboard) {
    navigator.clipboard.writeText(projectId).then(() => {
      alert("Project code copied. Send this code to someone so they can join.");
    }).catch(() => {
      prompt("Copy this project code:", projectId);
    });
  } else {
    prompt("Copy this project code:", projectId);
  }
}

function joinProject(){
  const code = document.getElementById("joinCode").value.trim();

  if (!code) {
    alert("Please enter project code");
    return;
  }

  const ref = db.collection("projects").doc(code);

  ref.get().then(doc => {
    if (!doc.exists) {
      alert("Invalid project code");
      return;
    }

    const data = doc.data();

    if (data.deleted === true) {
      alert("This project is in trash");
      return;
    }

    const updateData = {
      members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
      updatedAt: Date.now()
    };

    if (data.owner !== currentUser.uid) {
      updateData.sharedWith = firebase.firestore.FieldValue.arrayUnion(currentUser.uid);
    }

    return ref.update(updateData).then(() => {
      openProject(code);
    });
  }).catch(error => {
    alert("Join failed: " + error.message);
  });
}

function openProject(projectId){
  window.location.href = "editor.html?id=" + encodeURIComponent(projectId);
}

function logout(){
  auth.signOut().then(() => {
    window.location.href = "login.html";
  }).catch(error => {
    alert("Logout failed: " + error.message);
  });
}

function toggleMenu(event, projectId){
  event.stopPropagation();

  document.querySelectorAll(".dropdown").forEach(menu => {
    if (menu.id !== "menu-" + projectId) {
      menu.classList.remove("show");
    }
  });

  const menu = document.getElementById("menu-" + projectId);
  if (menu) menu.classList.toggle("show");
}

document.addEventListener("click", () => {
  document.querySelectorAll(".dropdown").forEach(menu => {
    menu.classList.remove("show");
  });
});

function getFolderName(folderId){
  if (!folderId || folderId === "root") return "Root";

  const folder = allFolders.find(f => f.id === folderId);
  return folder ? folder.name : "Unknown";
}

function formatDateOnly(timestamp){
  if (!timestamp) return "-";

  return new Date(timestamp).toLocaleDateString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric"
  });
}

function escapeHTML(text){
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
