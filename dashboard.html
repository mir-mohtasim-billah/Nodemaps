<!DOCTYPE html>
<html>
<head>
  <title>NodeMAPS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      background:#f5f7fb;
      color:#111827;
    }

    .sidebar{
      width:280px;
      background:linear-gradient(180deg,#0f172a,#0b1328);
      color:white;
      padding:22px 18px;
      display:flex;
      flex-direction:column;
      gap:18px;
      flex-shrink:0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      padding-bottom:12px;
    }

    .brand img{
      width:42px;
      height:42px;
      object-fit:contain;
    }

    .brand-name{
      font-size:22px;
      font-weight:700;
      letter-spacing:.5px;
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .nav-item{
      padding:12px 14px;
      border-radius:12px;
      color:#dbe3f1;
      cursor:pointer;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:10px;
      transition:.18s;
    }

    .nav-item:hover,
    .nav-item.active{
      background:rgba(255,255,255,.10);
      color:white;
    }

    .join-box{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .join-box input{
      width:100%;
      border:none;
      outline:none;
      padding:12px 14px;
      border-radius:12px;
      background:#f8fafc;
      color:#111827;
      font-size:14px;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:12px;
      padding:11px 14px;
      font-weight:700;
      font-size:15px;
      transition:.18s;
    }

    .btn-primary{
      background:#2563eb;
      color:white;
    }

    .btn-primary:hover{
      background:#1d4ed8;
    }

    .folder-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:#9fb0c8;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.7px;
    }

    .folder-add{
      background:transparent;
      color:#dbe3f1;
      border:none;
      cursor:pointer;
      font-size:22px;
      line-height:1;
    }

    .folders{
      display:flex;
      flex-direction:column;
      gap:6px;
      max-height:220px;
      overflow:auto;
      padding-right:4px;
    }

    .folder-item{
      padding:10px 12px;
      border-radius:10px;
      color:#dbe3f1;
      cursor:pointer;
      font-size:14px;
      display:flex;
      gap:8px;
      align-items:center;
      transition:.18s;
    }

    .folder-item:hover,
    .folder-item.active{
      background:rgba(255,255,255,.10);
      color:white;
    }

    .sidebar-footer{
      margin-top:auto;
      border-top:1px solid rgba(255,255,255,.10);
      padding-top:14px;
    }

    .user-small{
      font-size:13px;
      color:#b6c2d3;
      margin-bottom:10px;
      word-break:break-all;
    }

    .logout-btn{
      width:100%;
      background:rgba(255,255,255,.07);
      color:white;
      border:1px solid rgba(255,255,255,.10);
    }

    .logout-btn:hover{
      background:rgba(255,255,255,.13);
    }

    .main{
      flex:1;
      padding:30px;
      overflow:auto;
      min-width:0;
    }

    .welcome{
      margin-bottom:24px;
    }

    .welcome h1{
      font-size:30px;
      margin-bottom:8px;
      font-weight:800;
      color:#111827;
    }

    .welcome p{
      color:#6b7280;
      font-size:16px;
    }

    .cards{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:34px;
    }

    .card{
      width:205px;
      height:165px;
      background:white;
      border:1px solid #e5e7eb;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      box-shadow:0 10px 28px rgba(0,0,0,.04);
      transition:.2s;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 36px rgba(0,0,0,.08);
      border-color:#c7d2fe;
    }

    .card-icon{
      font-size:36px;
      margin-bottom:14px;
      line-height:1;
    }

    .plus{
      color:#2563eb;
      font-size:46px;
      font-weight:300;
    }

    .card span{
      font-size:16px;
      color:#374151;
      font-weight:600;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .section-title{
      font-size:18px;
      font-weight:800;
      color:#111827;
    }

    .search{
      width:360px;
      max-width:100%;
      border:1px solid #e5e7eb;
      background:white;
      padding:12px 14px;
      border-radius:14px;
      outline:none;
      font-size:14px;
      box-shadow:0 8px 18px rgba(0,0,0,.03);
    }

    .search:focus{
      border-color:#93c5fd;
    }

    .project-list{
      background:white;
      border:1px solid #e5e7eb;
      border-radius:18px;
      overflow:visible;
      box-shadow:0 18px 38px rgba(0,0,0,.06);
    }

    .table-head{
      display:grid;
      grid-template-columns:2.3fr .8fr 1fr 1fr 50px;
      gap:12px;
      padding:16px 20px;
      color:#6b7280;
      font-size:13px;
      border-bottom:1px solid #eef2f7;
      background:#fbfcff;
      border-radius:18px 18px 0 0;
      font-weight:700;
    }

    .project-row{
      display:grid;
      grid-template-columns:2.3fr .8fr 1fr 1fr 50px;
      gap:12px;
      align-items:center;
      padding:16px 20px;
      border-bottom:1px solid #eef2f7;
      transition:.16s;
      position:relative;
    }

    .project-row:last-child{
      border-bottom:none;
    }

    .project-row:hover{
      background:#f8fbff;
    }

    .project-name{
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      min-width:0;
    }

    .doc-icon{
      width:32px;
      height:32px;
      border-radius:10px;
      background:#eaf2ff;
      color:#2563eb;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:15px;
      flex:0 0 auto;
    }

    .name-block{
      min-width:0;
    }

    .name-text{
      font-weight:800;
      color:#111827;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:420px;
      font-size:15px;
    }

    .code-text{
      color:#94a3b8;
      font-size:12px;
      margin-top:4px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:420px;
    }

    .cell{
      color:#6b7280;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .star-mark{
      color:#f59e0b;
      margin-right:4px;
    }

    .menu-wrap{
      position:relative;
      display:flex;
      justify-content:flex-end;
    }

    .dots{
      width:34px;
      height:34px;
      border-radius:50%;
      border:none;
      background:transparent;
      cursor:pointer;
      font-size:20px;
      color:#6b7280;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .dots:hover{
      background:#eef2ff;
      color:#111827;
    }

    .dropdown{
      display:none;
      position:absolute;
      right:0;
      top:38px;
      width:200px;
      background:white;
      border:1px solid #e5e7eb;
      border-radius:12px;
      box-shadow:0 20px 45px rgba(0,0,0,.14);
      z-index:1000;
      overflow:hidden;
    }

    .dropdown.show{
      display:block;
    }

    .menu-option{
      padding:11px 13px;
      cursor:pointer;
      font-size:14px;
      color:#374151;
      display:flex;
      gap:9px;
      align-items:center;
    }

    .menu-option:hover{
      background:#f3f6ff;
    }

    .menu-danger{
      color:#dc2626;
    }

    .empty{
      padding:34px;
      color:#6b7280;
      text-align:center;
      font-size:14px;
    }

    @media(max-width:900px){
      body{
        display:block;
        min-height:100vh;
        overflow:auto;
      }

      .sidebar{
        width:100%;
        min-height:auto;
        padding:18px;
        gap:16px;
        border-radius:0 0 22px 22px;
      }

      .brand{
        padding-bottom:4px;
      }

      .brand img{
        width:34px;
        height:34px;
      }

      .brand-name{
        font-size:22px;
      }

      .nav{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
      }

      .nav-item{
        padding:11px 12px;
        font-size:14px;
      }

      .join-box{
        display:grid;
        grid-template-columns:1fr;
      }

      .folders{
        max-height:none;
      }

      .sidebar-footer{
        margin-top:0;
      }

      .main{
        padding:18px;
        overflow:visible;
      }

      .welcome h1{
        font-size:25px;
      }

      .welcome p{
        font-size:14px;
      }

      .cards{
        display:grid;
        grid-template-columns:1fr;
        gap:12px;
        margin-bottom:22px;
      }

      .card{
        width:100%;
        height:120px;
        border-radius:18px;
      }

      .toolbar{
        align-items:stretch;
      }

      .search{
        width:100%;
      }

      .table-head{
        display:none;
      }

      .project-row{
        grid-template-columns:1fr 42px;
        padding:14px;
      }

      .cell{
        display:none;
      }

      .name-text{
        max-width:calc(100vw - 130px);
      }

      .code-text{
        max-width:calc(100vw - 130px);
      }

      .dropdown{
        right:0;
        width:190px;
      }
    }

    @media(max-width:430px){
      .sidebar{
        padding:16px;
      }

      .nav{
        grid-template-columns:1fr;
      }

      .brand-name{
        font-size:20px;
      }

      .main{
        padding:14px;
      }
    }
  </style>
</head>

<body>

<aside class="sidebar">
  <div class="brand">
    <img src="logo.png" alt="NodeMAPS Logo">
    <div class="brand-name">NodeMAPS</div>
  </div>

  <div class="nav" id="mainNav"></div>

  <div class="join-box">
    <input id="joinCode" placeholder="Enter 6 digit invite code or project ID">
    <button class="btn btn-primary" onclick="joinProject()">Join Project</button>
  </div>

  <div class="folder-title">
    <span>Folders</span>
    <button class="folder-add" onclick="createFolder()" title="Create folder">+</button>
  </div>

  <div class="folders" id="foldersList"></div>

  <div class="sidebar-footer">
    <div class="user-small" id="userEmail">Signed in</div>
    <button class="btn logout-btn" onclick="logout()">Logout</button>
  </div>
</aside>

<main class="main">
  <div class="welcome">
    <h1>Welcome back 👋</h1>
    <p>Create, organize and explore your mind maps</p>
  </div>

  <div class="cards">
    <div class="card" onclick="createProject('blank')">
      <div class="card-icon plus">+</div>
      <span>Blank Map</span>
    </div>

    <div class="card" onclick="createProject('mindmap')">
      <div class="card-icon">🧠</div>
      <span>Mind Map</span>
    </div>

    <div class="card" onclick="createProject('orgchart')">
      <div class="card-icon">🏗️</div>
      <span>Org Chart</span>
    </div>
  </div>

  <div class="toolbar">
    <div class="section-title" id="viewTitle">My Maps</div>
    <input class="search" id="searchInput" placeholder="Search projects..." oninput="setSearch(this.value)">
  </div>

  <div class="project-list">
    <div class="table-head">
      <div>Name</div>
      <div>Owner</div>
      <div>Folder</div>
      <div>Updated</div>
      <div></div>
    </div>

    <div id="projects"></div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let currentUser = null;
let allProjects = [];
let allFolders = [];
let currentView = "all";
let currentFolder = null;
let searchText = "";
let projectsUnsub = null;
let foldersUnsub = null;

auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  document.getElementById("userEmail").textContent =
    user.email || user.displayName || "Signed in";

  renderMainNav();
  loadProjects();
  loadFolders();
});

function renderMainNav(){
  const items = [
    { id:"all", label:"Home", icon:"🏠" },
    { id:"starred", label:"Favorites", icon:"⭐" },
    { id:"shared", label:"Shared with me", icon:"👥" },
    { id:"trash", label:"Trash", icon:"🗑️" }
  ];

  let html = "";

  items.forEach(item => {
    html += `
      <div class="nav-item ${currentView === item.id ? "active" : ""}" onclick="setView('${item.id}')">
        <span>${item.icon}</span>
        <span>${item.label}</span>
      </div>
    `;
  });

  document.getElementById("mainNav").innerHTML = html;
}

function renderFolders(){
  let html = `
    <div class="folder-item ${currentView === "folder" && currentFolder === "root" ? "active" : ""}" onclick="setFolder('root')">
      📁 Root
    </div>
  `;

  allFolders.forEach(folder => {
    html += `
      <div class="folder-item ${currentView === "folder" && currentFolder === folder.id ? "active" : ""}" onclick="setFolder('${folder.id}')">
        📁 ${escapeHTML(folder.name)}
      </div>
    `;
  });

  document.getElementById("foldersList").innerHTML = html;
}

function setView(view){
  currentView = view;
  currentFolder = null;
  renderMainNav();
  renderFolders();
  renderProjects();
}

function setFolder(folderId){
  currentView = "folder";
  currentFolder = folderId;
  renderMainNav();
  renderFolders();
  renderProjects();
}

function setSearch(value){
  searchText = value.toLowerCase().trim();
  renderProjects();
}

function loadProjects(){
  if (projectsUnsub) projectsUnsub();

  projectsUnsub = db.collection("projects")
    .where("members", "array-contains", currentUser.uid)
    .onSnapshot(snapshot => {
      allProjects = [];

      snapshot.forEach(doc => {
        const data = doc.data();
        data.id = doc.id;
        allProjects.push(data);
      });

      allProjects.sort((a,b) =>
        (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0)
      );

      renderProjects();
    }, error => {
      document.getElementById("projects").innerHTML =
        `<div class="empty">Failed to load projects: ${escapeHTML(error.message)}</div>`;
    });
}

function loadFolders(){
  if (foldersUnsub) foldersUnsub();

  foldersUnsub = db.collection("folders")
    .where("members", "array-contains", currentUser.uid)
    .onSnapshot(snapshot => {
      allFolders = [];

      snapshot.forEach(doc => {
        const data = doc.data();
        data.id = doc.id;
        allFolders.push(data);
      });

      allFolders.sort((a,b) => (a.name || "").localeCompare(b.name || ""));
      renderFolders();
    }, error => {
      console.log("Folder load failed:", error.message);
      allFolders = [];
      renderFolders();
    });
}

function renderProjects(){
  let filtered = allProjects.filter(project => {
    const deleted = project.deleted === true;
    const ownerIsMe =
      project.owner === currentUser.uid ||
      project.ownerUid === currentUser.uid ||
      project.createdBy === currentUser.uid;

    const folder = project.folder || "root";
    const name = (project.name || project.title || "Untitled Project").toLowerCase();

    if (searchText && !name.includes(searchText)) return false;

    if (currentView === "all") return !deleted;
    if (currentView === "starred") return !deleted && project.starred === true;
    if (currentView === "shared") return !deleted && !ownerIsMe;
    if (currentView === "trash") return deleted;
    if (currentView === "folder") return !deleted && folder === currentFolder;

    return !deleted;
  });

  updateViewTitle();

  if (filtered.length === 0) {
    document.getElementById("projects").innerHTML =
      `<div class="empty">No projects found</div>`;
    return;
  }

  let html = "";

  filtered.forEach(project => {
    const ownerText = (
      project.owner === currentUser.uid ||
      project.ownerUid === currentUser.uid ||
      project.createdBy === currentUser.uid
    ) ? "me" : "shared";

    const folderName = getFolderName(project.folder || "root");
    const updated = formatDateOnly(project.updatedAt || project.createdAt);
    const created = formatDateOnly(project.createdAt);
    const projectName = project.name || project.title || "Untitled Project";

    html += `
      <div class="project-row">
        <div class="project-name" onclick="openProject('${project.id}')">
          <div class="doc-icon">▤</div>

          <div class="name-block">
            <div class="name-text">
              ${project.starred ? '<span class="star-mark">★</span>' : ""}
              ${escapeHTML(projectName)}
            </div>
            <div class="code-text">
              ${escapeHTML(project.id)} • Created ${created}
            </div>
          </div>
        </div>

        <div class="cell">${ownerText}</div>
        <div class="cell">${escapeHTML(folderName)}</div>
        <div class="cell">${updated}</div>

        <div class="menu-wrap">
          <button class="dots" onclick="toggleMenu(event, '${project.id}')">⋮</button>

          <div class="dropdown" id="menu-${project.id}">
            ${
              currentView === "trash"
              ? `
                <div class="menu-option" onclick="restoreProject(event, '${project.id}')">↩️ Restore</div>
                <div class="menu-option menu-danger" onclick="deleteForever(event, '${project.id}')">🗑️ Delete forever</div>
              `
              : `
                <div class="menu-option" onclick="renameProject(event, '${project.id}')">✏️ Rename</div>
                <div class="menu-option" onclick="toggleStar(event, '${project.id}')">
                  ${project.starred ? "☆ Unstar" : "⭐ Star"}
                </div>
                <div class="menu-option" onclick="moveToFolder(event, '${project.id}')">📁 Move to folder</div>
                <div class="menu-option" onclick="copyProjectCode(event, '${project.id}')">🔗 Copy project ID</div>
                <div class="menu-option menu-danger" onclick="moveToTrash(event, '${project.id}')">🗑️ Move to trash</div>
              `
            }
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById("projects").innerHTML = html;
}

function updateViewTitle(){
  let title = "My Maps";

  if (currentView === "starred") title = "Favorites";
  if (currentView === "shared") title = "Shared with me";
  if (currentView === "trash") title = "Trash";
  if (currentView === "folder") title = "Folder: " + getFolderName(currentFolder);

  document.getElementById("viewTitle").textContent = title;
}

function createProject(type){
  const id = "p_" + Date.now();

  let name = "Untitled Project";
  if (type === "mindmap") name = "Untitled Mind Map";
  if (type === "orgchart") name = "Untitled Org Chart";

  db.collection("projects").doc(id).set({
    name: name,
    title: name,
    type: type || "blank",
    owner: currentUser.uid,
    ownerUid: currentUser.uid,
    createdBy: currentUser.uid,
    ownerEmail: currentUser.email || "",
    members: [currentUser.uid],
    sharedWith: [],
    roles: {
      [currentUser.uid]: "owner"
    },
    memberProfiles: {
      [currentUser.uid]: profileFromCurrentUser()
    },
    dashboardAccess: {
      [currentUser.uid]: true
    },
    starred: false,
    folder: "root",
    deleted: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  }).then(() => {
    openProject(id);
  }).catch(error => {
    alert("Project create failed: " + error.message);
  });
}

function createFolder(){
  const name = prompt("Folder name:");

  if (!name || !name.trim()) return;

  const id = "f_" + Date.now();

  db.collection("folders").doc(id).set({
    name: name.trim(),
    owner: currentUser.uid,
    members: [currentUser.uid],
    createdAt: Date.now(),
    updatedAt: Date.now()
  }).catch(error => {
    alert("Folder create failed: " + error.message);
  });
}

function moveToFolder(event, projectId){
  event.stopPropagation();

  const folderName = prompt("Enter folder name. Type root to remove from folder:");

  if (!folderName || !folderName.trim()) return;

  const cleanName = folderName.trim();

  if (cleanName.toLowerCase() === "root") {
    db.collection("projects").doc(projectId).update({
      folder: "root",
      updatedAt: Date.now()
    });
    return;
  }

  let existing = allFolders.find(f =>
    (f.name || "").toLowerCase() === cleanName.toLowerCase()
  );

  if (existing) {
    db.collection("projects").doc(projectId).update({
      folder: existing.id,
      updatedAt: Date.now()
    });
    return;
  }

  const newFolderId = "f_" + Date.now();

  db.collection("folders").doc(newFolderId).set({
    name: cleanName,
    owner: currentUser.uid,
    members: [currentUser.uid],
    createdAt: Date.now(),
    updatedAt: Date.now()
  }).then(() => {
    return db.collection("projects").doc(projectId).update({
      folder: newFolderId,
      updatedAt: Date.now()
    });
  }).catch(error => {
    alert("Move failed: " + error.message);
  });
}

function renameProject(event, projectId){
  event.stopPropagation();

  const project = allProjects.find(p => p.id === projectId);
  const oldName = project ? (project.name || project.title || "Untitled Project") : "Untitled Project";

  const newName = prompt("Rename project:", oldName);

  if (!newName || !newName.trim()) return;

  db.collection("projects").doc(projectId).update({
    name: newName.trim(),
    title: newName.trim(),
    updatedAt: Date.now()
  }).catch(error => {
    alert("Rename failed: " + error.message);
  });
}

function toggleStar(event, projectId){
  event.stopPropagation();

  const project = allProjects.find(p => p.id === projectId);
  if (!project) return;

  db.collection("projects").doc(projectId).update({
    starred: !project.starred,
    updatedAt: Date.now()
  }).catch(error => {
    alert("Star update failed: " + error.message);
  });
}

function moveToTrash(event, projectId){
  event.stopPropagation();

  if (!confirm("Move this project to trash?")) return;

  db.collection("projects").doc(projectId).update({
    deleted: true,
    updatedAt: Date.now()
  }).catch(error => {
    alert("Delete failed: " + error.message);
  });
}

function restoreProject(event, projectId){
  event.stopPropagation();

  db.collection("projects").doc(projectId).update({
    deleted: false,
    updatedAt: Date.now()
  }).catch(error => {
    alert("Restore failed: " + error.message);
  });
}

function deleteForever(event, projectId){
  event.stopPropagation();

  if (!confirm("Delete forever? This cannot be undone.")) return;

  db.collection("projects").doc(projectId).delete().catch(error => {
    alert("Permanent delete failed: " + error.message);
  });
}

function copyProjectCode(event, projectId){
  event.stopPropagation();

  if (navigator.clipboard) {
    navigator.clipboard.writeText(projectId).then(() => {
      alert("Project ID copied.");
    }).catch(() => {
      prompt("Copy this project ID:", projectId);
    });
  } else {
    prompt("Copy this project ID:", projectId);
  }
}

/* FIXED JOIN SYSTEM */
async function joinProject(){
  const raw = document.getElementById("joinCode").value || "";
  const cleanInput = normalizeJoinInput(raw);

  if (!cleanInput) {
    alert("Please enter invite code or project ID");
    return;
  }

  try {
    if (/^\d{6}$/.test(cleanInput)) {
      await joinByInviteCode(cleanInput);
      return;
    }

    await joinByProjectId(cleanInput);

  } catch (error) {
    console.error("JOIN ERROR:", error);
    alert("Join failed: " + error.message);
  }
}

function normalizeJoinInput(value){
  return String(value)
    .trim()
    .replace(/\s+/g, "")
    .replace(/-/g, "")
    .replace(/[^\w]/g, "");
}

async function findInviteCode(code){
  let directSnap = await db.collection("inviteCodes").doc(String(code)).get();

  if (directSnap.exists) {
    return {
      id: directSnap.id,
      data: directSnap.data()
    };
  }

  let queryByString = await db.collection("inviteCodes")
    .where("code", "==", String(code))
    .limit(1)
    .get();

  if (!queryByString.empty) {
    let doc = queryByString.docs[0];
    return {
      id: doc.id,
      data: doc.data()
    };
  }

  let queryByNumber = await db.collection("inviteCodes")
    .where("code", "==", Number(code))
    .limit(1)
    .get();

  if (!queryByNumber.empty) {
    let doc = queryByNumber.docs[0];
    return {
      id: doc.id,
      data: doc.data()
    };
  }

  return null;
}

async function joinByInviteCode(code){
  const inviteResult = await findInviteCode(code);

  if (!inviteResult) {
    alert(
      "Invalid invite code.\n\n" +
      "Code checked: " + code + "\n\n" +
      "Generate a fresh 6 digit code from Add User inside the owner project, then try again."
    );
    return;
  }

  const inviteId = inviteResult.id;
  const invite = inviteResult.data || {};

  if (invite.active === false) {
    alert("This invite code is inactive");
    return;
  }

  if (invite.expiresAt && Date.now() > Number(invite.expiresAt)) {
    alert("This invite code has expired");
    return;
  }

  const used = Number(invite.used || 0);
  const maxUses = Number(invite.maxUses || 1);

  if (used >= maxUses) {
    alert("This invite code is already used");
    return;
  }

  if (!invite.projectId) {
    alert("Invite code found, but projectId is missing");
    return;
  }

  const projectRef = db.collection("projects").doc(invite.projectId);
  const projectSnap = await projectRef.get();

  if (!projectSnap.exists) {
    alert("Invite code found, but project does not exist");
    return;
  }

  const project = projectSnap.data() || {};

  if (project.deleted === true) {
    alert("This project is in trash");
    return;
  }

  const role = invite.role || "viewer";

  const updateData = {
    members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
    sharedWith: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
    updatedAt: Date.now()
  };

  updateData["roles." + currentUser.uid] = role;
  updateData["memberProfiles." + currentUser.uid] = profileFromCurrentUser();

  if (invite.dashboardAccess !== false) {
    updateData["dashboardAccess." + currentUser.uid] = true;
  }

  await projectRef.set(updateData, { merge:true });

  await db.collection("inviteCodes").doc(inviteId).set({
    used: firebase.firestore.FieldValue.increment(1),
    usedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
    lastUsedAt: Date.now()
  }, { merge:true });

  openProject(invite.projectId);
}

async function joinByProjectId(projectId){
  const projectRef = db.collection("projects").doc(projectId);
  const projectSnap = await projectRef.get();

  if (!projectSnap.exists) {
    alert("Invalid project ID");
    return;
  }

  const data = projectSnap.data() || {};

  if (data.deleted === true) {
    alert("This project is in trash");
    return;
  }

  const updateData = {
    members: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
    sharedWith: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
    updatedAt: Date.now()
  };

  updateData["roles." + currentUser.uid] = "editor";
  updateData["memberProfiles." + currentUser.uid] = profileFromCurrentUser();
  updateData["dashboardAccess." + currentUser.uid] = true;

  await projectRef.set(updateData, { merge:true });

  openProject(projectId);
}

function openProject(projectId){
  window.location.href = "editor.html?id=" + encodeURIComponent(projectId);
}

function logout(){
  auth.signOut().then(() => {
    window.location.href = "login.html";
  }).catch(error => {
    alert("Logout failed: " + error.message);
  });
}

function toggleMenu(event, projectId){
  event.stopPropagation();

  document.querySelectorAll(".dropdown").forEach(menu => {
    if (menu.id !== "menu-" + projectId) {
      menu.classList.remove("show");
    }
  });

  const menu = document.getElementById("menu-" + projectId);
  if (menu) menu.classList.toggle("show");
}

document.addEventListener("click", () => {
  document.querySelectorAll(".dropdown").forEach(menu => {
    menu.classList.remove("show");
  });
});

function getFolderName(folderId){
  if (!folderId || folderId === "root") return "Root";

  const folder = allFolders.find(f => f.id === folderId);
  return folder ? folder.name : "Unknown";
}

function formatDateOnly(timestamp){
  if (!timestamp) return "-";

  return new Date(timestamp).toLocaleDateString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric"
  });
}

function profileFromCurrentUser(){
  return {
    uid: currentUser.uid,
    name: currentUser.displayName || currentUser.email || "User",
    email: currentUser.email || "",
    updatedAt: Date.now()
  };
}

function escapeHTML(text){
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
