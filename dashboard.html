<!DOCTYPE html>
<html>
<head>
  <title>NodeMAPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      background: radial-gradient(circle at top left, #eef2ff, #f8fafc, #ffffff);
      overflow:hidden;
    }

    /* SIDEBAR (FIGMA STYLE DARK PREMIUM) */
    .sidebar{
      width:280px;
      background: rgba(17,24,39,0.95);
      backdrop-filter: blur(12px);
      color:white;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:14px;
      border-right:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      font-size:20px;
      font-weight:700;
      letter-spacing:0.5px;
      margin-bottom:10px;
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .nav-item{
      padding:12px 12px;
      border-radius:12px;
      cursor:pointer;
      color:#cbd5e1;
      transition:0.2s;
      font-size:14px;
    }

    .nav-item:hover{
      background:rgba(255,255,255,0.08);
      color:white;
      transform:translateX(3px);
    }

    /* MAIN */
    .main{
      flex:1;
      padding:30px;
      overflow:auto;
    }

    .header{
      margin-bottom:25px;
    }

    .title{
      font-size:28px;
      font-weight:700;
      color:#111827;
    }

    .subtitle{
      color:#6b7280;
      margin-top:6px;
    }

    /* CREATE SECTION */
    .cards{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:30px;
    }

    .card{
      width:180px;
      height:160px;
      border-radius:18px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border:1px solid rgba(0,0,0,0.06);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.25s ease;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
    }

    .card:hover{
      transform:translateY(-6px) scale(1.02);
      box-shadow:0 18px 40px rgba(0,0,0,0.12);
      border-color:#4f8cff;
    }

    .plus{
      font-size:44px;
      color:#2563eb;
      font-weight:300;
    }

    .label{
      margin-top:8px;
      font-size:14px;
      color:#374151;
      font-weight:500;
    }

    /* RECENT LIST (ULTRA POLISHED) */
    .list{
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border:1px solid rgba(0,0,0,0.06);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,0.06);
    }

    .row{
      display:flex;
      justify-content:space-between;
      padding:16px 18px;
      cursor:pointer;
      transition:0.2s;
      border-bottom:1px solid rgba(0,0,0,0.04);
    }

    .row:hover{
      background:#f3f7ff;
      transform:scale(1.01);
    }

    .name{
      font-weight:500;
      color:#111827;
    }

    .meta{
      color:#6b7280;
      font-size:13px;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">NodeMAPS</div>

  <div class="nav">
    <div class="nav-item">🏠 Home</div>
    <div class="nav-item">⭐ Favorites</div>
    <div class="nav-item">🗂 My Maps</div>
    <div class="nav-item">🗑 Trash</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <div class="title">Welcome back 👋</div>
    <div class="subtitle">Create, organize and explore your mind maps</div>
  </div>

  <!-- CREATE CARDS -->
  <div class="cards">

    <div class="card" onclick="createProject()">
      <div class="plus">+</div>
      <div class="label">Blank Map</div>
    </div>

    <div class="card">
      <div style="font-size:30px;">🧠</div>
      <div class="label">Mind Map</div>
    </div>

    <div class="card">
      <div style="font-size:30px;">🏗</div>
      <div class="label">Org Chart</div>
    </div>

  </div>

  <!-- RECENT -->
  <div class="list" id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

auth.onAuthStateChanged(user=>{
  if(!user) window.location.href="login.html";
  load();
});

function createProject(){
  let id="p_"+Date.now();

  db.collection("projects").doc(id).set({
    name:"Untitled Map",
    owner:auth.currentUser.uid,
    members:[auth.currentUser.uid],
    createdAt:Date.now()
  }).then(()=>{
    openProject(id);
  });
}

function load(){
  db.collection("projects")
  .where("members","array-contains",auth.currentUser.uid)
  .onSnapshot(snap=>{

    let html="";

    snap.forEach(doc=>{
      let d=doc.data();

      html+=`
        <div class="row" onclick="openProject('${doc.id}')">
          <div class="name">${d.name}</div>
          <div class="meta">me</div>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;

  });
}

function openProject(id){
  window.location.href="editor.html?id="+id;
}

</script>

</body>
</html>
