<!DOCTYPE html>
<html>
<head>
  <title>NodeMAPS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f6f8fb;
      color: #1f2937;
    }

    .dashboard {
      max-width: 1100px;
      margin: auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      color: #111827;
    }

    .brand p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .logout-btn {
      border: none;
      background: #eef2f7;
      color: #374151;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .logout-btn:hover {
      background: #e5eaf1;
    }

    .action-box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 28px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .new-btn {
      border: none;
      background: #4f8cff;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }

    .new-btn:hover {
      background: #3f7df0;
    }

    .join-area {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 260px;
    }

    .join-area input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      background: #fafafa;
    }

    .join-area input:focus {
      border-color: #4f8cff;
      background: white;
    }

    .join-area button {
      border: none;
      background: #eaf2ff;
      color: #2563eb;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .join-area button:hover {
      background: #dbeafe;
    }

    .section-title {
      font-size: 18px;
      margin-bottom: 14px;
      color: #111827;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .project-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.035);
    }

    .project-card:hover {
      transform: translateY(-3px);
      border-color: #bcd4ff;
      box-shadow: 0 12px 24px rgba(0,0,0,0.07);
    }

    .project-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #eaf2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4f8cff;
      font-size: 20px;
      margin-bottom: 14px;
    }

    .project-card h3 {
      margin: 0 0 8px;
      font-size: 17px;
      color: #111827;
    }

    .project-code {
      font-size: 12px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 6px 8px;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 14px;
      word-break: break-all;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #f0f0f0;
      padding-top: 12px;
      color: #6b7280;
      font-size: 13px;
    }

    .copy-btn {
      border: none;
      background: transparent;
      color: #4f8cff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .empty {
      background: white;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      padding: 35px;
      text-align: center;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      .dashboard {
        padding: 18px;
      }

      .topbar {
        align-items: flex-start;
        gap: 14px;
      }

      .brand h1 {
        font-size: 23px;
      }

      .action-box {
        display: block;
      }

      .new-btn {
        width: 100%;
        margin-bottom: 12px;
      }

      .join-area {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="dashboard">

  <div class="topbar">
    <div class="brand">
      <h1>NodeMAPS Dashboard</h1>
      <p>Create, open, or join your mind map projects</p>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="action-box">
    <button class="new-btn" onclick="createProject()">+ New Project</button>

    <div class="join-area">
      <input id="joinCode" placeholder="Enter Project Code">
      <button onclick="joinProject()">Join</button>
    </div>
  </div>

  <h2 class="section-title">Your Projects</h2>

  <div id="projects" class="projects-grid">
    <div class="empty">Loading projects...</div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  loadProjects();
});

function createProject() {
  let id = "p_" + Date.now();
  let user = auth.currentUser;

  db.collection("projects").doc(id).set({
    name: "Untitled Project",
    owner: user.uid,
    members: [user.uid],
    users: {
      [user.uid]: {
        name: user.displayName || user.email || "User",
        role: "owner",
        online: true
      }
    },
    createdAt: Date.now()
  }).then(() => {
    openProject(id);
  }).catch(error => {
    alert("Project create failed: " + error.message);
  });
}

function loadProjects() {
  db.collection("projects")
    .where("members", "array-contains", auth.currentUser.uid)
    .onSnapshot(snap => {

      let projectsBox = document.getElementById("projects");

      if (snap.empty) {
        projectsBox.innerHTML = `
          <div class="empty">
            No projects yet. Click <b>+ New Project</b> to start.
          </div>
        `;
        return;
      }

      let html = "";

      snap.forEach(doc => {
        let data = doc.data();
        let projectName = data.name || "Untitled Project";

        html += `
          <div class="project-card" onclick="openProject('${doc.id}')">
            <div class="project-icon">☰</div>

            <h3>${escapeHTML(projectName)}</h3>

            <span class="project-code">${doc.id}</span>

            <div class="card-footer">
              <span>Open project</span>
              <button class="copy-btn" onclick="copyCode(event, '${doc.id}')">Copy Code</button>
            </div>
          </div>
        `;
      });

      projectsBox.innerHTML = html;

    }, error => {
      document.getElementById("projects").innerHTML = `
        <div class="empty">
          Failed to load projects: ${escapeHTML(error.message)}
        </div>
      `;
    });
}

function joinProject() {
  let code = document.getElementById("joinCode").value.trim();

  if (!code) {
    alert("Please enter a project code");
    return;
  }

  db.collection("projects").doc(code).get().then(doc => {
    if (doc.exists) {
      db.collection("projects").doc(code).update({
        members: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)
      }).then(() => {
        openProject(code);
      });
    } else {
      alert("Invalid Project Code");
    }
  }).catch(error => {
    alert("Join failed: " + error.message);
  });
}

function openProject(id) {
  window.location.href = "editor.html?id=" + id;
}

function logout() {
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}

function copyCode(event, code) {
  event.stopPropagation();

  navigator.clipboard.writeText(code).then(() => {
    alert("Project code copied");
  });
}

function escapeHTML(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>

</body>
</html>
