<!DOCTYPE html>
<html>
<head>
<title>NodeMAPS Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR (YOUR STYLE ONLY) -->
<div class="topbar">
<h2>NodeMAPS</h2>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN AREA -->
<div id="projects"></div>

<!-- ACTION PANEL (NO NEW DESIGN SYSTEM) -->
<div>
<button onclick="createProject()">+ New Project</button>

<input id="joinCode" placeholder="Enter Code">
<button onclick="joinProject()">Join</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

auth.onAuthStateChanged(user=>{
if(!user) window.location.href="login.html";
loadProjects();
});

function createProject(){
let id = "p_" + Date.now();

db.collection("projects").doc(id).set({
name:"Untitled Project",
owner:auth.currentUser.uid,
members:[auth.currentUser.uid],
createdAt:Date.now()
});

openProject(id);
}

function loadProjects(){
db.collection("projects")
.where("members","array-contains",auth.currentUser.uid)
.onSnapshot(snap=>{

document.getElementById("projects").innerHTML="";

snap.forEach(doc=>{
let div=document.createElement("div");
div.className="project";
div.innerHTML=doc.data().name;

div.onclick=()=>openProject(doc.id);

document.getElementById("projects").appendChild(div);
});

});
}

function openProject(id){
localStorage.setItem("projectId",id);
window.location.href="editor.html";
}

function joinProject(){
let code=document.getElementById("joinCode").value;

db.collection("projects").doc(code).get().then(doc=>{
if(doc.exists){
db.collection("projects").doc(code).update({
members:firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)
});
openProject(code);
}else{
alert("Invalid Code");
}
});
}

function logout(){
auth.signOut().then(()=>window.location.href="login.html");
}

</script>

</body>
</html>
