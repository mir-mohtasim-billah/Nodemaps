<!DOCTYPE html>
<html>
<head>
  <title>Editor</title>
</head>
<body>

<h2>Editor</h2>

<div id="canvas"></div>

<div id="users"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

const projectId = new URLSearchParams(window.location.search).get("id");

let state = {nodes:[], edges:[]};

auth.onAuthStateChanged(user=>{
  if(!user) window.location.href="login.html";

  joinUser(user);

  listenProject();
  liveLockCleaner();
});

/* ================= USERS ================= */

function joinUser(user){
  db.collection("projects").doc(projectId).update({
    ["users."+user.uid]:{
      name:user.displayName,
      role:"editor",
      online:true,
      lastSeen:Date.now()
    }
  });
}

/* ================= LIVE PROJECT ================= */

function listenProject(){
  db.collection("projects").doc(projectId)
  .onSnapshot(doc=>{
    let data = doc.data();

    if(data.state){
      state = data.state;
      render();
    }

    renderUsers(data.users);
  });
}

/* ================= AUTO SAVE ================= */

function updateState(){
  db.collection("projects").doc(projectId).update({
    state:state
  });
}

/* instant autosave */
setInterval(()=>{
  updateState();
}, 2000);

/* ================= LOCK SYSTEM ================= */

function lockNode(nodeId){
  db.collection("projects").doc(projectId).update({
    ["locks."+nodeId]:{
      uid:auth.currentUser.uid,
      expiresAt:Date.now()+15000
    }
  });
}

/* auto unlock */
function liveLockCleaner(){
  setInterval(async ()=>{
    let doc = await db.collection("projects").doc(projectId).get();
    let locks = doc.data().locks || {};
    let now = Date.now();

    Object.keys(locks).forEach(id=>{
      if(locks[id].expiresAt < now){
        db.collection("projects").doc(projectId).update({
          ["locks."+id]:firebase.firestore.FieldValue.delete()
        });
      }
    });

  },5000);
}

/* ================= USERS UI ================= */

function renderUsers(users){
  let html = "<h3>Active Users</h3>";

  for(let id in users){
    html += `<div>${users[id].name} (${users[id].role})</div>`;
  }

  document.getElementById("users").innerHTML = html;
}

/* ================= RENDER ================= */

function render(){
  document.getElementById("canvas").innerHTML =
    "<pre>"+JSON.stringify(state,null,2)+"</pre>";
}

</script>

</body>
</html>
