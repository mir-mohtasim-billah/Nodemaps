<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NodeMAPS Login</title>

<style>
:root{
  --primary:#5b63ff;
  --primary2:#7b4dff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --danger:#ef4444;
  --shadow:0 22px 55px rgba(30,41,59,.16);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:
    radial-gradient(circle at 10% 10%, #dbeafe 0%, transparent 28%),
    radial-gradient(circle at 90% 15%, #ede9fe 0%, transparent 32%),
    linear-gradient(135deg,#f8fbff,#eef2ff);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:var(--text);
}

.login-card{
  width:min(980px,100%);
  height:min(560px,calc(100vh - 40px));
  min-height:520px;
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:var(--shadow);
  display:grid;
  grid-template-columns:360px 1fr;
  border:1px solid rgba(255,255,255,.8);
}

.left{
  padding:28px 30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:#ffffff;
  overflow:auto;
}

.badge{
  width:max-content;
  padding:8px 14px;
  border-radius:999px;
  background:#eef2ff;
  color:#4f46e5;
  font-size:13px;
  font-weight:700;
  margin-bottom:18px;
}

.logo{
  margin:0;
  font-size:30px;
  letter-spacing:4px;
  font-weight:800;
}

.tagline{
  margin:10px 0 26px;
  color:var(--muted);
  font-size:14.5px;
  line-height:1.45;
}

.form-title{
  margin:0 0 6px;
  font-size:24px;
}

.form-sub{
  margin:0 0 18px;
  color:var(--muted);
  font-size:14px;
}

input{
  width:100%;
  height:46px;
  border:1px solid var(--border);
  border-radius:13px;
  padding:0 15px;
  font-size:14px;
  outline:none;
  margin-bottom:11px;
  background:#fff;
}

input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(91,99,255,.12);
}

button{
  width:100%;
  height:46px;
  border-radius:13px;
  font-size:14.5px;
  font-weight:700;
  cursor:pointer;
}

.email-btn{
  border:none;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  box-shadow:0 12px 24px rgba(91,99,255,.24);
}

.email-btn:hover{
  transform:translateY(-1px);
}

.divider{
  display:flex;
  align-items:center;
  gap:10px;
  margin:15px 0;
  color:var(--muted);
  font-size:13px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  height:1px;
  background:var(--border);
}

.google-btn{
  background:#fff;
  color:#111827;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.google-btn:hover{
  background:#f9fafb;
}

.google-btn img{
  width:18px;
  height:18px;
}

.switch{
  margin-top:14px;
  text-align:center;
  color:var(--muted);
  font-size:13.5px;
}

.switch span{
  color:var(--primary);
  font-weight:700;
  cursor:pointer;
}

.error{
  min-height:16px;
  margin-top:10px;
  color:var(--danger);
  font-size:12.5px;
  text-align:center;
}

.right{
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,#eef2ff,#f5f3ff);
}

.hero-img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.right-overlay{
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,rgba(255,255,255,.10),rgba(255,255,255,0)),
    linear-gradient(180deg,rgba(255,255,255,0),rgba(99,102,241,.08));
  pointer-events:none;
}

.hero-text{
  position:absolute;
  left:22px;
  bottom:22px;
  width:310px;
  padding:16px;
  border-radius:18px;
  background:rgba(255,255,255,.28);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 12px 32px rgba(15,23,42,.10);
}

.hero-text h3{
  margin:0 0 6px;
  font-size:17px;
}

.hero-text p{
  margin:0;
  font-size:12.5px;
  color:#374151;
  line-height:1.5;
}

.loading{
  opacity:.75;
  pointer-events:none;
}

@media(max-width:820px){
  .login-card{
    height:auto;
    min-height:auto;
    grid-template-columns:1fr;
  }

  .right{
    height:250px;
    order:-1;
  }

  .left{
    padding:26px 22px;
  }
}

@media(max-width:480px){
  body{
    padding:12px;
  }

  .login-card{
    border-radius:22px;
  }

  .logo{
    font-size:26px;
  }

  .hero-text{
    display:none;
  }
}
</style>
</head>

<body>

<div class="login-card">

  <div class="left">
    <div class="badge">✨ Smart Mind Mapping</div>

    <h1 class="logo">NodeMAPS</h1>
    <p class="tagline">Plan, connect, organize, and share your ideas beautifully.</p>

    <h2 class="form-title" id="formTitle">Welcome back</h2>
    <p class="form-sub" id="formSub">Login to continue to your workspace.</p>

    <input id="email" type="email" placeholder="Email address">
    <input id="password" type="password" placeholder="Password">

    <button id="emailBtn" class="email-btn" onclick="emailLogin()">Login with Email</button>

    <div class="divider">or continue with</div>

    <button class="google-btn" onclick="googleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      Login with Google
    </button>

    <div class="switch">
      <span id="toggleText" onclick="toggleMode()">Create account</span>
    </div>

    <div id="error" class="error"></div>
  </div>

  <div class="right">
    <img
      class="hero-img"
      src="login-hero.png"
      alt=""
      onerror="this.onerror=null; this.src='login-hero.png.png';"
    >

    <div class="right-overlay"></div>

    <div class="hero-text">
      <h3>Your ideas, connected beautifully</h3>
      <p>Create mind maps, organize thoughts, and build clear project plans in one workspace.</p>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let isSignup = false;

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const errorBox = document.getElementById("error");
const emailBtn = document.getElementById("emailBtn");
const toggleText = document.getElementById("toggleText");
const formTitle = document.getElementById("formTitle");
const formSub = document.getElementById("formSub");

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
.then(() => {
  auth.onAuthStateChanged(user => {
    if(user){
      window.location.href = "dashboard.html";
    }
  });
})
.catch(error => {
  showError(error.message);
});

function showError(message){
  errorBox.textContent = message || "";
}

function setLoading(value){
  document.body.classList.toggle("loading", value);
}

function toggleMode(){
  isSignup = !isSignup;

  if(isSignup){
    formTitle.textContent = "Create account";
    formSub.textContent = "Create your NodeMAPS workspace.";
    emailBtn.textContent = "Create Account";
    toggleText.textContent = "Login instead";
  }else{
    formTitle.textContent = "Welcome back";
    formSub.textContent = "Login to continue to your workspace.";
    emailBtn.textContent = "Login with Email";
    toggleText.textContent = "Create account";
  }

  showError("");
}

function emailLogin(){
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if(!email || !password){
    showError("Please enter email and password.");
    return;
  }

  if(password.length < 6){
    showError("Password must be at least 6 characters.");
    return;
  }

  setLoading(true);
  showError("");

  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
  .then(() => {
    if(isSignup){
      return auth.createUserWithEmailAndPassword(email, password);
    }else{
      return auth.signInWithEmailAndPassword(email, password);
    }
  })
  .then(() => {
    window.location.href = "dashboard.html";
  })
  .catch(error => {
    showError(cleanError(error.code));
  })
  .finally(() => {
    setLoading(false);
  });
}

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();

  setLoading(true);
  showError("");

  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
  .then(() => auth.signInWithPopup(provider))
  .then(() => {
    window.location.href = "dashboard.html";
  })
  .catch(error => {
    showError(cleanError(error.code));
  })
  .finally(() => {
    setLoading(false);
  });
}

function cleanError(code){
  if(code === "auth/user-not-found") return "No account found with this email.";
  if(code === "auth/wrong-password") return "Wrong password.";
  if(code === "auth/email-already-in-use") return "This email already has an account.";
  if(code === "auth/invalid-email") return "Invalid email address.";
  if(code === "auth/weak-password") return "Password is too weak.";
  if(code === "auth/popup-closed-by-user") return "Google login popup was closed.";
  if(code === "auth/invalid-credential") return "Email or password is incorrect.";
  return "Something went wrong. Please try again.";
}
</script>

</body>
</html>
